<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="f-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8e1d2;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#c4b8a8;stop-opacity:1"/>
    </linearGradient>
    <radialGradient id="f-basin" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#7b7b7b;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#4a4a4a;stop-opacity:1"/>
    </radialGradient>
  </defs>
  <rect width="400" height="300" fill="url(#f-bg)"/>
  <!-- Stone basin -->
  <ellipse cx="200" cy="200" rx="100" ry="60" fill="url(#f-basin)"/>
  <ellipse cx="200" cy="195" rx="95" ry="55" fill="#3c4245" opacity="0.5"/>
  <!-- Fountain tiers -->
  <rect x="175" y="120" width="50" height="40" rx="5" fill="#6b7275" opacity="0.8"/>
  <ellipse cx="200" cy="120" rx="30" ry="8" fill="#5c6b66"/>
  <!-- Water arcs -->
  <path d="M 150 140 Q 130 100 160 80" stroke="#159fda" stroke-width="3" fill="none" opacity="0.7" stroke-linecap="round"/>
  <path d="M 250 140 Q 270 100 240 80" stroke="#159fda" stroke-width="3" fill="none" opacity="0.7" stroke-linecap="round"/>
  <!-- Splashes -->
  <circle cx="170" cy="190" r="8" fill="#159fda" opacity="0.4"/>
  <circle cx="230" cy="195" r="6" fill="#159fda" opacity="0.4"/>
  <!-- Highlight on basin -->
  <ellipse cx="160" cy="180" rx="20" ry="15" fill="#f5f1e8" opacity="0.15"/>
</svg>