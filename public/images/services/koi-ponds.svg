<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="kp-water" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#159fda;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#0b2430;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="kp-sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8e1d2;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#c4b8a8;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#kp-sky)"/>
  <ellipse cx="200" cy="160" rx="180" ry="90" fill="url(#kp-water)"/>
  <!-- Koi silhouettes -->
  <g transform="translate(120, 150)">
    <ellipse cx="0" cy="0" rx="35" ry="20" fill="#16191b" opacity="0.8"/>
    <path d="M 35 -8 L 55 -12 L 50 0 L 55 12 L 35 8" fill="#16191b" opacity="0.8"/>
    <circle cx="-20" cy="-8" r="3" fill="#f0c400"/>
  </g>
  <g transform="translate(280, 170)" opacity="0.6">
    <ellipse cx="0" cy="0" rx="30" ry="18" fill="#16191b"/>
    <path d="M 30 -6 L 48 -10 L 44 0 L 48 10 L 30 6" fill="#16191b"/>
    <circle cx="-16" cy="-6" r="2" fill="#f0c400"/>
  </g>
  <!-- Lily pads -->
  <circle cx="100" cy="135" r="22" fill="#2fa84f" opacity="0.7"/>
  <circle cx="310" cy="145" r="18" fill="#2fa84f" opacity="0.7"/>
  <!-- Water ripples -->
  <circle cx="200" cy="160" r="60" fill="none" stroke="#f5f1e8" stroke-width="1" opacity="0.4"/>
  <circle cx="200" cy="160" r="90" fill="none" stroke="#f5f1e8" stroke-width="0.5" opacity="0.2"/>
</svg>