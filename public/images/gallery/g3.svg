<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g3-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8e1d2;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#b3a89a;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="g3-water" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8fd4ef;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#0b2430;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#g3-bg)"/>
  <!-- Terraced levels -->
  <path d="M 40 100 L 160 80 L 280 100 L 400 120" fill="#6b7275" opacity="0.6"/>
  <path d="M 40 100 L 160 140 L 280 160 L 400 200" fill="#6b7275" opacity="0.7"/>
  <!-- Water level -->
  <path d="M 40 140 L 160 160 L 280 180 L 400 200 L 400 300 L 40 300 Z" fill="url(#g3-water)"/>
  <!-- Waterfall -->
  <path d="M 160 80 Q 155 105 160 130" stroke="#159fda" stroke-width="5" fill="none" opacity="0.75"/>
  <!-- Plants on terraces -->
  <g transform="translate(80, 100)">
    <path d="M 0 20 Q -6 8 -8 -5" stroke="#2fa84f" stroke-width="2" fill="none"/>
    <path d="M 0 20 Q 6 8 8 -5" stroke="#2fa84f" stroke-width="2" fill="none"/>
  </g>
  <g transform="translate(320, 130)">
    <path d="M 0 20 Q -8 8 -10 -8" stroke="#2fa84f" stroke-width="2" fill="none"/>
    <path d="M 0 20 Q 8 8 10 -8" stroke="#2fa84f" stroke-width="2" fill="none"/>
  </g>
</svg>