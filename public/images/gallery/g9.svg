<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g9-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8e1d2;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#b3a89a;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="g9-water" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#159fda;stop-opacity:0.7"/>
      <stop offset="100%" style="stop-color:#0b2430;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#g9-bg)"/>
  <!-- Landscaped grounds -->
  <path d="M 0 180 Q 80 140 160 160 Q 240 180 320 140 Q 360 120 400 160 L 400 300 L 0 300 Z" fill="#2fa84f" opacity="0.5"/>
  <!-- Grand central water feature -->
  <ellipse cx="200" cy="190" rx="110" ry="65" fill="url(#g9-water)"/>
  <!-- Stone border -->
  <ellipse cx="200" cy="190" rx="110" ry="65" fill="none" stroke="#6b7275" stroke-width="2" opacity="0.7"/>
  <!-- Central fountain stone -->
  <circle cx="200" cy="150" r="30" fill="#6b7275" opacity="0.8"/>
  <!-- Cascading water -->
  <path d="M 200 180 Q 190 195 200 225" stroke="#159fda" stroke-width="4" fill="none" opacity="0.7"/>
  <!-- Landscaping rocks -->
  <circle cx="120" cy="170" r="15" fill="#6b7275" opacity="0.7"/>
  <circle cx="280" cy="180" r="18" fill="#6b7275" opacity="0.7"/>
  <!-- Large aquatic plants -->
  <g transform="translate(80, 160)">
    <line x1="0" y1="0" x2="0" y2="-60" stroke="#2fa84f" stroke-width="3"/>
    <ellipse cx="-10" cy="-35" rx="7" ry="12" fill="#2fa84f"/>
    <ellipse cx="10" cy="-45" rx="7" ry="12" fill="#2fa84f"/>
  </g>
  <g transform="translate(320, 175)">
    <line x1="0" y1="0" x2="0" y2="-55" stroke="#2fa84f" stroke-width="3"/>
    <ellipse cx="-8" cy="-30" rx="6" ry="11" fill="#2fa84f"/>
    <ellipse cx="8" cy="-40" rx="6" ry="11" fill="#2fa84f"/>
  </g>
  <!-- Koi -->
  <g transform="translate(170, 200)" opacity="0.7">
    <ellipse cx="0" cy="0" rx="16" ry="10" fill="#16191b"/>
    <path d="M 16 -6 L 30 -9 L 27 0 L 30 9 L 16 6" fill="#16191b"/>
    <circle cx="-8" cy="-6" r="2" fill="#f0c400"/>
  </g>
  <g transform="translate(250, 210)" opacity="0.6">
    <ellipse cx="0" cy="0" rx="14" ry="9" fill="#16191b"/>
    <path d="M 14 -5 L 26 -8 L 23 0 L 26 8 L 14 5" fill="#16191b"/>
    <circle cx="-7" cy="-5" r="1.5" fill="#f0c400"/>
  </g>
</svg>