<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g8-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8e1d2;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#d0c7b8;stop-opacity:1"/>
    </linearGradient>
    <radialGradient id="g8-urn" cx="50%" cy="40%" r="60%">
      <stop offset="0%" style="stop-color:#8b7355;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#5c4a3c;stop-opacity:1"/>
    </radialGradient>
  </defs>
  <rect width="400" height="300" fill="url(#g8-bg)"/>
  <!-- Paved entryway -->
  <rect x="50" y="150" width="300" height="150" fill="#b3b3b3" opacity="0.4"/>
  <!-- Decorative urn -->
  <ellipse cx="200" cy="130" rx="40" ry="50" fill="url(#g8-urn)" stroke="#3c4245" stroke-width="2"/>
  <!-- Urn mouth -->
  <ellipse cx="200" cy="85" rx="38" ry="12" fill="#6b7275" opacity="0.7"/>
  <!-- Water spilling -->
  <path d="M 175 85 Q 170 110 180 150" stroke="#159fda" stroke-width="3" fill="none" opacity="0.75"/>
  <path d="M 225 85 Q 230 110 220 150" stroke="#159fda" stroke-width="3" fill="none" opacity="0.75"/>
  <!-- Base basin -->
  <ellipse cx="200" cy="200" rx="70" ry="30" fill="#159fda" opacity="0.5"/>
  <!-- Splashes -->
  <circle cx="160" cy="195" r="4" fill="#159fda" opacity="0.4"/>
  <circle cx="240" cy="205" r="3" fill="#159fda" opacity="0.35"/>
</svg>