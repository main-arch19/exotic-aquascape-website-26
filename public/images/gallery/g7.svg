<svg viewBox="0 0 300 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g7-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8e1d2;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#b3a89a;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="g7-water" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8fd4ef;stop-opacity:0.7"/>
      <stop offset="100%" style="stop-color:#0b2430;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <rect width="300" height="450" fill="url(#g7-bg)"/>
  <!-- Landscape with stream flow -->
  <path d="M 0 50 Q 50 40 100 60 L 100 450 L 0 450 Z" fill="#2fa84f" opacity="0.5"/>
  <path d="M 100 60 Q 150 80 200 70 L 200 450 L 100 450 Z" fill="#6b7275" opacity="0.6"/>
  <path d="M 200 70 Q 250 90 300 100 L 300 450 L 200 450 Z" fill="#2fa84f" opacity="0.5"/>
  <!-- Stream flowing down -->
  <path d="M 100 60 Q 110 120 105 200 Q 100 280 120 380" stroke="#159fda" stroke-width="8" fill="none" opacity="0.7"/>
  <!-- Waterfall at top -->
  <path d="M 100 60 Q 95 85 105 120" stroke="#159fda" stroke-width="6" fill="none" opacity="0.75"/>
  <!-- Rocks in stream -->
  <circle cx="95" cy="150" r="10" fill="#6b7275" opacity="0.8"/>
  <circle cx="125" cy="250" r="12" fill="#6b7275" opacity="0.8"/>
  <circle cx="105" cy="350" r="9" fill="#6b7275" opacity="0.7"/>
  <!-- Stream-side plants -->
  <g transform="translate(70, 200)">
    <path d="M 0 20 Q -6 5 -8 -10" stroke="#2fa84f" stroke-width="2" fill="none"/>
    <ellipse cx="-8" cy="-12" rx="3" ry="6" fill="#2fa84f"/>
  </g>
  <g transform="translate(200, 300)">
    <path d="M 0 20 Q 8 8 10 -5" stroke="#2fa84f" stroke-width="2" fill="none"/>
    <ellipse cx="10" cy="-8" rx="3" ry="5" fill="#2fa84f"/>
  </g>
</svg>